# アプリケーション設定
spring.application.name=AnimeNotice
server.port=8080
spring.profiles.include=local

# データベース (H2 ファイルベース - ローカル開発用)
spring.datasource.url=jdbc:h2:file:./data/anime-notice-db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false

# Spring Security - CSRF は Thymeleaf が自動処理
# セッション設定
server.servlet.session.timeout=30m

# メール設定 (Gmail SMTP)
# spring.mail.username と spring.mail.password に実際の値を設定してください
# パスワードはGmailのアプリパスワード（16文字）を使用してください
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ログ
logging.level.com.animenotice=INFO
